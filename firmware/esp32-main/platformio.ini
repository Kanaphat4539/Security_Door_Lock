; Security Door Lock — ESP32 Dev Board
; RFID x2, Ultrasonic, OLED, Buzzer, Relay
;
; โปรโตคอลที่คุยกับ ESP32-CAM อยู่ที่ firmware/shared/protocol.h
; ซึ่งเป็นไฟล์เดียวกันกับที่ esp32-cam ใช้ — แก้ที่เดียวมีผลทั้งสองบอร์ด
; (ดึงเข้ามาด้วย -I ข้างล่าง จึง #include "protocol.h" ได้ตรง ๆ)

[env:esp32-main]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
	-Wall
	-I$PROJECT_DIR/../shared

; ใช้ MFRC522v2 (ไม่ใช่ miguelbalboa/MFRC522 v1) เพราะหัวอ่านสองตัว
; อยู่คนละ SPI bus (VSPI/HSPI) — v1 ผูกกับ global SPI object ตายตัว รองรับไม่ได้
lib_deps =
	computer991/Arduino_MFRC522v2
	adafruit/Adafruit SSD1306
	adafruit/Adafruit GFX Library
