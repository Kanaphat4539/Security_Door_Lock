; Security Door Lock — ESP32-CAM
; กล้อง + Wi-Fi + TFT (ตัวที่คุยกับ backend)
;
; โปรโตคอลที่คุยกับ esp32-main อยู่ที่ firmware/shared/protocol.h
; ซึ่งเป็นไฟล์เดียวกันกับที่ esp32-main ใช้ — แก้ที่เดียวมีผลทั้งสองบอร์ด
; (ดึงเข้ามาด้วย -I ข้างล่าง จึง #include "protocol.h" ได้ตรง ๆ)
;
; ก่อน build ครั้งแรก: copy src/secrets.example.h เป็น src/secrets.h แล้วใส่ค่าจริง
; (secrets.h ถูก gitignore ไว้ เพราะมี Wi-Fi และ DEVICE_TOKEN)

[env:esp32-cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
build_flags =
	-Wall
	-I$PROJECT_DIR/../shared
lib_deps =
	bblanchon/ArduinoJson
